<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TeleCloud - Error</title>
    <link rel="icon" href="/static/favicon.ico" type="image/x-icon">
    <link rel="shortcut icon" href="/static/favicon.ico" type="image/x-icon">
    <link rel="stylesheet" href="/static/css/tailwind.css">
    <link rel="stylesheet" href="/static/css/fontawesome.min.css">
    <link rel="stylesheet" href="/static/css/style.css">
    <script src="/static/js/common.js"></script>
</head>

<body
    class="bg-slate-50 dark:bg-slate-950 text-slate-800 dark:text-slate-200 min-h-screen flex items-center justify-center p-4 relative"
    x-data="{ lang: TeleCloud.lang, t(key) { return TeleCloud.t(key, {}, this.lang); }, toggleLang() { this.lang = TeleCloud.toggleLang(); } }">

    <button @click="toggleLang"
        class="absolute top-6 right-6 h-10 px-3 flex items-center gap-2 text-slate-500 hover:text-blue-500 bg-white/50 dark:bg-slate-800/50 rounded-xl border border-transparent hover:border-blue-100 dark:hover:border-blue-900 transition-colors shadow-sm">
        <i class="fa-solid fa-earth-americas text-lg"></i>
        <span class="text-sm font-bold uppercase" x-text="lang"></span>
    </button>

    <div class="blob-1"></div>
    <div class="blob-2"></div>

    <div class="glass-panel p-8 md:p-10 rounded-[2rem] w-full max-w-md text-center animate-modal-in">
        <div
            class="w-20 h-20 bg-red-100 dark:bg-red-500/20 text-red-500 rounded-full mx-auto flex items-center justify-center mb-6">
            <i class="fa-solid fa-triangle-exclamation text-4xl"></i>
        </div>
        <h2 class="text-2xl font-bold text-slate-900 dark:text-white mb-2" x-text="t('access_failed')"></h2>
        <p class="text-slate-600 dark:text-slate-400 mb-8"
            x-text="'{{ .error_message }}'.includes('File not found') || '{{ .error_message }}' === '' ? t('file_not_found_msg') : '{{ .error_message }}'">
        </p>

        <a href="/"
            class="inline-flex w-full justify-center items-center gap-2 px-5 py-3 rounded-xl bg-blue-600 hover:bg-blue-500 text-white font-semibold transition-all shadow-lg active:scale-95">
            <i class="fa-solid fa-house"></i>
            <span x-text="t('back_home')"></span>
        </a>

        <div class="mt-8 pt-6 border-t border-slate-200 dark:border-slate-800 flex justify-center gap-4 text-slate-400">
            <a href="https://github.com/dabeecao/telecloud-go" target="_blank" class="hover:text-blue-500 transition-colors">
                <i class="fa-brands fa-github text-xl"></i>
            </a>
            <p class="text-xs font-medium">TeleCloud OS &copy; 2026</p>
        </div>
    </div>

    <script defer src="/static/js/alpine.min.js"></script>
</body>

</html>
