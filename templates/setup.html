<!DOCTYPE html>
<html lang="en" class="h-full">

<head>
    <meta charset="UTF-8">
    <meta name="viewport"
        content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>TeleCloud - Setup</title>
    <link rel="icon" href="/static/favicon.ico" type="image/x-icon">
    <link rel="shortcut icon" href="/static/favicon.ico" type="image/x-icon">

    <link rel="stylesheet" href="/static/css/tailwind.css">
    <link rel="stylesheet" href="/static/css/fontawesome.min.css">
    <link rel="stylesheet" href="/static/css/style.css">

    <script src="/static/js/common.js"></script>
    <script>TeleCloud.version = '{{ .version }}';</script>
    <script src="/static/js/script.js"></script>
    <script defer src="/static/js/alpine-collapse.min.js"></script>
    <script defer src="/static/js/alpine.min.js"></script>
</head>

<body
    class="bg-slate-50 dark:bg-slate-950 text-slate-800 dark:text-slate-200 h-full relative overflow-hidden flex flex-col transition-colors duration-500"
    x-data="cloudApp(false, 0, false, '', '')">
    <div class="blob-1"></div>
    <div class="blob-2"></div>

    <div x-show="toastModal.show" x-cloak
        class="fixed inset-0 z-[300] flex items-center justify-center bg-slate-900/40 backdrop-blur-sm p-4"
        x-transition.opacity>
        <div @click.outside="toastModal.show = false"
            class="glass-menu w-full max-w-sm rounded-[2rem] p-6 shadow-2xl animate-modal-in border border-white/20 relative flex flex-col items-center text-center">

            <div class="w-16 h-16 rounded-full flex items-center justify-center mb-4 shadow-inner"
                :class="toastModal.type === 'error' ? 'bg-red-100 text-red-500 dark:bg-red-500/20' : 'bg-emerald-100 text-emerald-500 dark:bg-emerald-500/20'">
                <i class="fa-solid text-3xl" :class="toastModal.type === 'error' ? 'fa-xmark' : 'fa-check'"></i>
            </div>

            <h3 class="text-xl font-bold text-slate-900 dark:text-white mb-2"
                x-text="toastModal.type === 'error' ? t('failure') : t('success')"></h3>
            <p class="text-slate-600 dark:text-slate-300 text-sm mb-2" x-text="toastModal.message"></p>

            <button @click="toastModal.show = false"
                class="mt-4 w-full py-3 rounded-xl text-white font-medium shadow-lg transition-transform active:scale-95"
                :class="toastModal.type === 'error' ? 'bg-red-600 hover:bg-red-500 shadow-red-500/25' : 'bg-blue-600 hover:bg-blue-500 shadow-blue-500/25'"
                x-text="t('close')">
            </button>
        </div>
    </div>

    <div x-show="modal.show" x-cloak
        class="fixed inset-0 z-[200] flex items-center justify-center bg-slate-900/40 backdrop-blur-sm"
        x-transition.opacity>
        <div @click.outside="if(modal.type==='alert') closeUIModal(null)"
            class="glass-menu w-[90%] max-w-sm rounded-[2rem] p-6 shadow-2xl animate-modal-in border border-white/20">
            <h3 class="text-xl font-bold mb-2 text-slate-900 dark:text-white" x-text="modal.title"></h3>
            <p class="text-slate-600 dark:text-slate-300 text-sm mb-5" x-text="modal.message" x-show="modal.message">
            </p>
            <div class="flex justify-end gap-3 mt-2">
                <button @click="closeUIModal(true)"
                    class="px-5 py-2 rounded-xl text-white font-medium shadow-lg transition-transform active:scale-95 bg-blue-600 hover:bg-blue-500 shadow-blue-500/25"
                    x-text="modal.type === 'alert' ? t('close') : t('confirm')"></button>
            </div>
        </div>
    </div>

    <div class="w-full h-[100dvh] flex flex-col items-center justify-center p-4 z-10">
        <div class="glass-panel p-8 md:p-10 rounded-[2rem] w-full max-w-md relative overflow-hidden">
            <button @click="toggleLang"
                class="absolute top-4 right-4 h-8 px-2 flex items-center gap-1.5 text-slate-500 hover:text-blue-500 bg-white/50 dark:bg-slate-800/50 rounded-lg transition-colors">
                <i class="fa-solid fa-earth-americas text-xs"></i>
                <span class="text-[10px] font-bold uppercase" x-text="lang"></span>
            </button>
            <div class="text-center mb-8">
                <div
                    class="w-16 h-16 bg-gradient-to-br from-blue-500 to-purple-600 rounded-2xl mx-auto flex items-center justify-center shadow-lg shadow-blue-500/30 mb-4">
                    <i class="fa-solid fa-user-shield text-3xl text-white"></i>
                </div>
                <h2 class="text-3xl font-bold tracking-tight text-slate-900 dark:text-white" x-text="t('setup_title')">Welcome</h2>
                <p class="text-sm text-slate-500 mt-2" x-text="t('setup_desc')">Create an admin account to continue</p>
            </div>
            <form @submit.prevent="setupAdmin">
                <input type="text" autocomplete="username" x-model="username"
                    :placeholder="t('username')" required
                    class="w-full p-4 rounded-xl bg-white/50 dark:bg-slate-900/60 border border-slate-200 dark:border-slate-700/50 focus:outline-none focus:ring-2 focus:ring-blue-500 text-slate-900 dark:text-white mb-4 backdrop-blur-sm transition-all">
                <input type="password" autocomplete="new-password" x-model="password"
                    :placeholder="t('password')" required
                    class="w-full p-4 rounded-xl bg-white/50 dark:bg-slate-900/60 border border-slate-200 dark:border-slate-700/50 focus:outline-none focus:ring-2 focus:ring-blue-500 text-slate-900 dark:text-white mb-4 backdrop-blur-sm transition-all">
                <input type="password" autocomplete="new-password" x-model="confirmPassword"
                    :placeholder="t('setup_confirm_password')" required
                    class="w-full p-4 rounded-xl bg-white/50 dark:bg-slate-900/60 border border-slate-200 dark:border-slate-700/50 focus:outline-none focus:ring-2 focus:ring-blue-500 text-slate-900 dark:text-white mb-6 backdrop-blur-sm transition-all">
                <button type="submit"
                    class="w-full py-4 rounded-xl bg-blue-600 hover:bg-blue-500 text-white font-semibold transition-all shadow-lg active:scale-[0.98]"
                    x-text="t('create_account')"></button>
            </form>
        </div>
    </div>
</body>

</html>
