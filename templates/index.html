<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>TeleCloud OS</title>
    <link rel="icon" href="/static/favicon.ico" type="image/x-icon">
    <link rel="shortcut icon" href="/static/favicon.ico" type="image/x-icon">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'media',
            theme: {
                extend: {
                    fontFamily: { sans: ['Nunito', 'sans-serif'] },
                    animation: { 
                        'toast-in': 'toastEnter 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards',
                        'modal-in': 'modalEnter 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards',
                        'pulse-fast': 'pulse 1s cubic-bezier(0.4, 0, 0.6, 1) infinite'
                    },
                    keyframes: {
                        toastEnter: {
                            '0%': { transform: 'translate(-50%, -150%) scale(0.5)', opacity: '0' },
                            '100%': { transform: 'translate(-50%, 0) scale(1)', opacity: '1' }
                        },
                        modalEnter: {
                            '0%': { transform: 'scale(0.95)', opacity: '0' },
                            '100%': { transform: 'scale(1)', opacity: '1' }
                        }
                    }
                }
            }
        }
    </script>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <link rel="stylesheet" href="/static/css/style.css">
    
    <script src="/static/js/common.js"></script>
    <script src="/static/js/script.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <link rel="stylesheet" href="https://cdn.plyr.io/3.7.8/plyr.css" />
    <script src="https://cdn.plyr.io/3.7.8/plyr.polyfilled.js"></script>
</head>

<body class="bg-slate-50 dark:bg-slate-950 text-slate-800 dark:text-slate-200 min-h-[100dvh] relative overflow-hidden flex transition-colors duration-500" 
      x-data="cloudApp({{ if .logged_in }}true{{ else }}false{{ end }}, {{ .max_upload_size_mb }})" 
      @dragover.prevent="dragOver = true" 
      @dragleave.prevent="dragOver = false" 
      @drop.prevent="handleDrop($event)">
    
    <div class="blob-1"></div><div class="blob-2"></div>

    <div x-show="dragOver" x-cloak class="absolute inset-0 z-[150] flex items-center justify-center bg-blue-600/90 backdrop-blur-md transition-all duration-300">
        <div class="text-center">
            <i class="fa-solid fa-cloud-arrow-up text-7xl text-white mx-auto mb-4 animate-bounce block"></i>
            <h2 class="text-3xl font-bold text-white shadow-sm" x-text="t('drop_files')"></h2>
            <p class="text-white/80 mt-2"><span x-text="t('max_limit')"></span>: <span x-text="maxUploadSizeMB"></span> MB</p>
        </div>
    </div>

    <div x-show="uploadModal" x-cloak class="fixed inset-0 z-[200] flex items-center justify-center bg-slate-900/40 backdrop-blur-sm" x-transition.opacity>
        <div @click.outside="uploadModal = false" class="glass-menu w-[90%] max-w-md rounded-[2rem] p-6 shadow-2xl animate-modal-in border border-white/20">
            <div class="flex justify-between items-center mb-4">
                <h3 class="text-xl font-bold text-slate-900 dark:text-white" x-text="t('upload')"></h3>
                <button @click="uploadModal = false" class="text-slate-400 hover:text-slate-700 dark:hover:text-white hover:bg-slate-100 dark:hover:bg-slate-800 p-1.5 rounded-full transition-colors shrink-0">
                    <i class="fa-solid fa-xmark text-xl"></i>
                </button>
            </div>

            <div class="border-2 border-dashed rounded-2xl p-8 text-center transition-colors relative flex flex-col items-center justify-center"
                 :class="uploadDragOver ? 'border-blue-500 bg-blue-50 dark:bg-blue-900/20' : 'border-slate-300 dark:border-slate-600 hover:border-blue-400 dark:hover:border-blue-500 bg-white/50 dark:bg-slate-800/50'"
                 @dragover.prevent="uploadDragOver = true"
                 @dragleave.prevent="uploadDragOver = false"
                 @drop.prevent="handleUploadModalDrop($event)">
                
                <i class="fa-solid fa-cloud-arrow-up text-5xl text-blue-500 mb-4 transition-transform duration-300" :class="uploadDragOver ? 'scale-110' : ''"></i>
                <h4 class="text-lg font-semibold text-slate-800 dark:text-slate-200 mb-1" x-text="t('drop_modal')"></h4>
                <p class="text-sm text-slate-500 dark:text-slate-400 mb-5" x-text="t('or_click')"></p>

                <input type="file" multiple class="hidden" x-ref="modalFileInput" @change="handleUploadModalSelect">
                <button @click="$refs.modalFileInput.click()" class="px-6 py-2.5 bg-blue-600 hover:bg-blue-500 text-white rounded-xl font-semibold shadow-lg shadow-blue-500/25 transition-transform active:scale-95 z-10 relative" x-text="t('select_files')">
                </button>
            </div>
            
            <div class="mt-4 text-center text-xs text-slate-500 dark:text-slate-400">
                <span x-text="t('max_size')"></span>: <span class="font-semibold text-slate-700 dark:text-slate-300" x-text="maxUploadSizeMB"></span> MB
            </div>
        </div>
    </div>

    <div x-show="modal.show" x-cloak class="fixed inset-0 z-[200] flex items-center justify-center bg-slate-900/40 backdrop-blur-sm" x-transition.opacity>
        <div @click.outside="if(modal.type==='alert') closeUIModal(null)" class="glass-menu w-[90%] max-w-sm rounded-[2rem] p-6 shadow-2xl animate-modal-in border border-white/20">
            <h3 class="text-xl font-bold mb-2 text-slate-900 dark:text-white" x-text="modal.title"></h3>
            <p class="text-slate-600 dark:text-slate-300 text-sm mb-5" x-text="modal.message" x-show="modal.message"></p>
            <template x-if="modal.type === 'prompt'">
                <input type="text" x-model="modal.input" x-ref="modalInput" @keydown.enter="closeUIModal(modal.input)" class="w-full p-3 rounded-xl bg-white/50 dark:bg-slate-900/60 border border-slate-200 dark:border-slate-700 focus:outline-none focus:ring-2 focus:ring-blue-500 text-slate-900 dark:text-white mb-5 transition-all">
            </template>
            <div class="flex justify-end gap-3 mt-2">
                <template x-if="modal.type !== 'alert'">
                    <button @click="closeUIModal(null)" class="px-4 py-2 rounded-xl text-slate-600 dark:text-slate-300 hover:bg-slate-100 dark:hover:bg-slate-800 font-medium transition-colors" x-text="t('cancel')"></button>
                </template>
                <button @click="closeUIModal(modal.type === 'prompt' ? modal.input : true)" 
                        class="px-5 py-2 rounded-xl text-white font-medium shadow-lg transition-transform active:scale-95"
                        :class="modal.isDanger ? 'bg-red-600 hover:bg-red-500 shadow-red-500/25' : 'bg-blue-600 hover:bg-blue-500 shadow-blue-500/25'"
                        x-text="modal.type === 'alert' ? t('close') : t('confirm')"></button>
            </div>
        </div>
    </div>

    <div x-show="contextMenu.show" x-cloak @click.outside="closeContextMenu" @contextmenu.prevent="closeContextMenu"
         :style="`top: ${contextMenu.y}px; left: ${contextMenu.x}px;`"
         class="fixed glass-menu z-[100] w-52 rounded-2xl p-1.5 text-sm shadow-2xl" x-transition.opacity.duration.200ms>
        <template x-if="contextMenu.file">
            <div>
                <template x-if="!contextMenu.file.is_folder">
                <button @click="startDownload(contextMenu.file.id); closeContextMenu()" class="w-full flex items-center gap-3 px-3 py-2.5 rounded-xl hover:bg-slate-100 dark:hover:bg-slate-700/50 text-slate-700 dark:text-slate-200 font-medium transition-colors">
                    <i class="fa-solid fa-download fa-fw text-slate-400"></i> <span x-text="t('download')"></span>
                </button>
                </template>

                <template x-if="!contextMenu.file.is_folder">
                    <button @click="toggleShare(contextMenu.file); closeContextMenu()" class="w-full flex items-center gap-3 px-3 py-2.5 rounded-xl hover:bg-slate-100 dark:hover:bg-slate-700/50 text-slate-700 dark:text-slate-200 font-medium transition-colors">
                        <i class="fa-solid fa-link fa-fw text-emerald-500"></i>
                        <span x-text="contextMenu.file.share_token ? t('revoke_link') : t('share_link')"></span>
                    </button>
                </template>

                <template x-if="contextMenu.file.share_token">
                    <div class="space-y-1">
                        <button @click="copyShareLink(contextMenu.file, 'regular'); closeContextMenu()" class="w-full flex items-center gap-3 px-3 py-2 rounded-xl bg-emerald-50 dark:bg-emerald-500/10 hover:bg-emerald-100 dark:hover:bg-emerald-500/20 text-emerald-600 dark:text-emerald-400 font-medium transition-colors text-xs">
                            <i class="fa-solid fa-share-nodes fa-fw"></i> <span x-text="t('copy_share_link')"></span>
                        </button>
                        <button @click="copyShareLink(contextMenu.file, 'direct'); closeContextMenu()" class="w-full flex items-center gap-3 px-3 py-2 rounded-xl bg-blue-50 dark:bg-blue-500/10 hover:bg-blue-100 dark:hover:bg-blue-500/20 text-blue-600 dark:text-blue-400 font-medium transition-colors text-xs">
                            <i class="fa-solid fa-copy fa-fw"></i> <span x-text="t('copy_direct_link')"></span>
                        </button>
                    </div>
                </template>

                <div class="h-px bg-slate-200 dark:bg-slate-700/50 my-1 mx-2"></div>

                <button @click="renameFile(contextMenu.file); closeContextMenu()" class="w-full flex items-center gap-3 px-3 py-2.5 rounded-xl hover:bg-slate-100 dark:hover:bg-slate-700/50 text-slate-700 dark:text-slate-200 font-medium transition-colors"><i class="fa-solid fa-pen fa-fw text-slate-400"></i> <span x-text="t('rename')"></span></button>
                <button @click="copyToClipboard('move', [contextMenu.file.id]); closeContextMenu()" class="w-full flex items-center gap-3 px-3 py-2.5 rounded-xl hover:bg-slate-100 dark:hover:bg-slate-700/50 text-slate-700 dark:text-slate-200 font-medium transition-colors"><i class="fa-solid fa-folder-tree fa-fw text-slate-400"></i> <span x-text="t('move')"></span></button>
                <button @click="copyToClipboard('copy', [contextMenu.file.id]); closeContextMenu()" class="w-full flex items-center gap-3 px-3 py-2.5 rounded-xl hover:bg-slate-100 dark:hover:bg-slate-700/50 text-slate-700 dark:text-slate-200 font-medium transition-colors"><i class="fa-solid fa-copy fa-fw text-slate-400"></i> <span x-text="t('copy')"></span></button>
                
                <div class="h-px bg-slate-200 dark:bg-slate-700/50 my-1 mx-2"></div>
                
                <button @click="deleteFile(contextMenu.file.id); closeContextMenu()" class="w-full flex items-center gap-3 px-3 py-2.5 rounded-xl hover:bg-red-50 dark:hover:bg-red-500/10 text-red-600 dark:text-red-400 font-medium transition-colors"><i class="fa-solid fa-trash fa-fw"></i> <span x-text="t('delete')"></span></button>
            </div>
        </template>
    </div>

    <div x-show="fileInfoModal.show" x-cloak class="fixed inset-0 z-[250] flex items-center justify-center bg-slate-900/40 backdrop-blur-sm" x-transition.opacity>
        <div @click.outside="closeFileInfoModal()" class="glass-menu w-[90%] max-w-sm max-h-[90vh] overflow-y-auto hide-scrollbar rounded-[2rem] p-6 shadow-2xl animate-modal-in border border-white/20">
            
            <div class="flex items-start gap-4 mb-2">
                <div class="w-14 h-14 rounded-2xl flex items-center justify-center shadow-inner shrink-0 transition-colors overflow-hidden relative" :class="fileInfoModal.bgColor">
                    <template x-if="fileInfoModal.file?.has_thumb">
                        <img :src="`/api/files/${fileInfoModal.file.id}/thumb`" class="w-full h-full object-cover absolute inset-0 z-10">
                    </template>
                    <template x-if="!fileInfoModal.file?.has_thumb">
                        <div x-html="fileInfoModal.svgIcon"></div>
                    </template>
                </div>
                <div class="flex-1 min-w-0 pt-1">
                    <h3 class="text-lg font-bold text-slate-900 dark:text-white truncate" 
                        x-text="fileInfoModal.file?.filename" 
                        :title="fileInfoModal.file?.filename"></h3>
                    <p class="text-slate-500 dark:text-slate-400 text-sm font-medium mt-0.5" x-text="fileInfoModal.typeName"></p>
                </div>
    
                <button @click="closeFileInfoModal()" class="p-1.5 text-slate-400 hover:text-slate-700 dark:hover:text-white hover:bg-slate-100 dark:hover:bg-slate-800 rounded-full transition-colors shrink-0">
                    <i class="fa-solid fa-xmark text-xl"></i>
                </button>
            </div>
            
            <div x-show="fileInfoModal.isMedia" class="w-full mt-4 mb-2 flex flex-col items-center justify-center transition-all" x-html="fileInfoModal.mediaHtml"></div>

            <div class="space-y-3 mt-5 bg-white/50 dark:bg-slate-900/50 p-4 rounded-xl border border-slate-200 dark:border-slate-700/50">
                <div class="flex justify-between text-sm">
                    <span class="text-slate-500 dark:text-slate-400" x-text="t('size') + ':'"></span>
                    <span class="font-semibold text-slate-800 dark:text-slate-200" x-text="formatBytes(fileInfoModal.file?.size)"></span>
                </div>
                <div class="flex justify-between text-sm">
                    <span class="text-slate-500 dark:text-slate-400" x-text="t('date') + ':'"></span>
                    <span class="font-semibold text-slate-800 dark:text-slate-200" x-text="formatDate(fileInfoModal.file?.created_at)"></span>
                </div>
                <div class="flex justify-between text-sm">
                    <span class="text-slate-500 dark:text-slate-400" x-text="t('status') + ':'"></span>
                    <span class="font-semibold" 
                          :class="fileInfoModal.file?.share_token ? 'text-emerald-600 dark:text-emerald-400' : 'text-slate-800 dark:text-slate-200'" 
                          x-text="fileInfoModal.file?.share_token ? t('public') : t('private')"></span>
                </div>
            </div>

            <div class="mt-4 flex flex-col gap-1.5">
                <button @click="startDownload(fileInfoModal.file?.id); closeFileInfoModal()" class="w-full flex items-center justify-center gap-2 px-4 py-3 rounded-xl bg-blue-600 hover:bg-blue-500 text-white font-medium shadow-lg shadow-blue-500/25 transition-transform active:scale-95">
                    <i class="fa-solid fa-download"></i> <span x-text="t('download')"></span>
                </button>

                <template x-if="fileInfoModal.file?.share_token">
                    <div class="grid grid-cols-2 gap-2 mt-1">
                        <button @click="copyShareLink(fileInfoModal.file, 'regular')" class="flex flex-col items-center justify-center gap-1 p-2 rounded-xl bg-emerald-50 dark:bg-emerald-500/10 hover:bg-emerald-100 text-emerald-600 font-medium transition-colors text-xs">
                            <i class="fa-solid fa-share-nodes text-base mb-0.5"></i>
                            <span x-text="t('copy_share_link')"></span>
                        </button>
                        <button @click="copyShareLink(fileInfoModal.file, 'direct')" class="flex flex-col items-center justify-center gap-1 p-2 rounded-xl bg-blue-50 dark:bg-blue-500/10 hover:bg-blue-100 text-blue-600 font-medium transition-colors text-xs">
                            <i class="fa-solid fa-copy text-base mb-0.5"></i>
                            <span x-text="t('copy_direct_link')"></span>
                        </button>
                    </div>
                </template>

                <div class="grid grid-cols-3 gap-2 mt-1">
                    <button @click="toggleShare(fileInfoModal.file); closeFileInfoModal()" 
                            class="flex flex-col items-center justify-center gap-1.5 p-2 rounded-xl font-medium transition-colors"
                            :class="fileInfoModal.file?.share_token ? 'text-red-500 bg-red-50 hover:bg-red-100 dark:bg-red-500/10 dark:hover:bg-red-500/20' : 'bg-slate-100 dark:bg-slate-800 hover:bg-slate-200 dark:hover:bg-slate-700 text-slate-700 dark:text-slate-300'">
                        <i class="fa-solid fa-link text-base"></i>
                        <span class="text-[11px] text-center leading-tight" x-text="fileInfoModal.file?.share_token ? t('revoke_link') : t('share_link')"></span>
                    </button>
                    <button @click="copyToClipboard('move', [fileInfoModal.file?.id]); closeFileInfoModal()" class="flex flex-col items-center justify-center gap-1.5 p-2 rounded-xl bg-slate-100 dark:bg-slate-800 hover:bg-slate-200 dark:hover:bg-slate-700 text-slate-700 dark:text-slate-300 font-medium transition-colors">
                        <i class="fa-solid fa-folder-tree text-base"></i>
                        <span class="text-[11px]" x-text="t('move')"></span>
                    </button>
                    <button @click="renameFile(fileInfoModal.file); closeFileInfoModal()" class="flex flex-col items-center justify-center gap-1.5 p-2 rounded-xl bg-slate-100 dark:bg-slate-800 hover:bg-slate-200 dark:hover:bg-slate-700 text-slate-700 dark:text-slate-300 font-medium transition-colors">
                        <i class="fa-solid fa-pen text-base"></i>
                        <span class="text-[11px]" x-text="t('rename')"></span>
                    </button>
                </div>
            </div>
        </div>
    </div>

    <div x-show="!isLoggedIn" x-cloak class="w-full h-[100dvh] flex flex-col items-center justify-center p-4 z-10" x-transition.opacity>
        <div class="glass-panel p-8 md:p-10 rounded-[2rem] w-full max-w-md relative overflow-hidden">
            <button @click="toggleLang" class="absolute top-4 right-4 h-8 px-2 flex items-center gap-1.5 text-slate-500 hover:text-blue-500 bg-white/50 dark:bg-slate-800/50 rounded-lg transition-colors">
                <i class="fa-solid fa-earth-americas text-xs"></i>
                <span class="text-[10px] font-bold uppercase" x-text="lang"></span>
            </button>
            <div class="text-center mb-8">
                <div class="w-16 h-16 bg-gradient-to-br from-blue-500 to-purple-600 rounded-2xl mx-auto flex items-center justify-center shadow-lg shadow-blue-500/30 mb-4">
                    <i class="fa-solid fa-cloud text-3xl text-white"></i>
                </div>
                <h2 class="text-3xl font-bold tracking-tight text-slate-900 dark:text-white">TeleCloud OS</h2>
            </div>
            <form @submit.prevent="login">
                <input type="password" x-model="password" :placeholder="t('access_code')" class="w-full p-4 rounded-xl bg-white/50 dark:bg-slate-900/60 border border-slate-200 dark:border-slate-700/50 focus:outline-none focus:ring-2 focus:ring-blue-500 text-slate-900 dark:text-white mb-6 backdrop-blur-sm transition-all">
                <button type="submit" class="w-full py-4 rounded-xl bg-blue-600 hover:bg-blue-500 text-white font-semibold transition-all shadow-lg active:scale-[0.98]" x-text="t('access_system')"></button>
            </form>
        </div>
    </div>

    <div x-show="isLoggedIn" x-cloak class="flex flex-col w-full h-[100dvh] z-10 p-0 md:p-4 pb-0" x-transition.opacity>
        <main class="flex-1 flex flex-col h-full glass-panel md:rounded-[2rem] relative overflow-hidden" @contextmenu.prevent="if(event.target === $el) openContextMenu(event, null)">
            
            <header class="flex items-center justify-between p-3 md:p-6 border-b border-slate-200 dark:border-white/5 bg-white/30 dark:bg-slate-900/30 gap-2 sm:gap-4 h-[72px] sm:h-auto shrink-0">
                <div class="flex items-center gap-1 flex-1 overflow-hidden">
                    <div class="flex items-center text-sm md:text-base font-semibold text-slate-500 dark:text-slate-400 whitespace-nowrap overflow-x-auto pb-1 hide-scrollbar w-full">
                        <button @click="navigateTo('/')" class="hover:text-blue-600 dark:hover:text-blue-400 transition flex items-center gap-1.5 px-2 py-1 rounded-lg shrink-0">
                            <i class="fa-solid fa-house text-base"></i>
                            <span class="hidden sm:inline">TeleCloud</span>
                        </button>
                        <template x-for="(part, index) in getBreadcrumbs()" :key="index">
                            <div class="flex items-center shrink-0">
                                <i class="fa-solid fa-chevron-right text-[10px] text-slate-400 mx-1"></i>
                                <button @click="navigateToIndex(index)" class="hover:text-blue-600 dark:hover:text-blue-400 transition px-2 py-1 rounded-lg max-w-[100px] sm:max-w-[150px] truncate" x-text="part"></button>
                            </div>
                        </template>
                    </div>
                </div>
                <div class="flex items-center gap-1.5 sm:gap-3 shrink-0">
                    <button @click="toggleLang" class="h-9 sm:h-10 px-2 sm:px-3 flex items-center gap-2 text-slate-500 hover:text-blue-500 bg-white/50 dark:bg-slate-800/50 rounded-xl border border-transparent hover:border-blue-100 dark:hover:border-blue-900 transition-colors" :title="t('lang_' + (lang === 'vi' ? 'en' : 'vi'))">
                        <i class="fa-solid fa-earth-americas text-base sm:text-lg"></i>
                        <span class="text-xs sm:text-sm font-bold uppercase" x-text="lang"></span>
                    </button>
                    <button @click="createNewFolder" class="hidden sm:flex px-4 py-2 bg-white/50 dark:bg-slate-800 text-slate-700 dark:text-white border border-slate-200 dark:border-slate-700 rounded-xl font-semibold items-center gap-2 transition-colors"><i class="fa-solid fa-folder-plus"></i><span class="hidden lg:inline" x-text="t('new_folder')"></span></button>
                    <button @click="uploadModal = true" class="px-3 py-2 sm:px-5 sm:py-2 bg-blue-600 hover:bg-blue-500 text-white rounded-xl shadow-lg font-semibold flex items-center gap-2 transition-all"><i class="fa-solid fa-cloud-arrow-up"></i><span class="hidden sm:inline" x-text="t('upload')"></span></button>
                    <button @click="logout" :title="t('logout')" class="w-9 h-9 sm:w-auto sm:p-2.5 flex items-center justify-center text-slate-500 hover:text-red-500 bg-white/50 dark:bg-slate-800/50 rounded-xl border border-transparent hover:border-red-100 dark:hover:border-red-900 transition-colors">
                        <i class="fa-solid fa-arrow-right-from-bracket text-lg"></i>
                    </button>
                </div>
            </header>

            <div x-show="isRefreshing" x-cloak class="h-1 w-full bg-slate-200 dark:bg-slate-800 overflow-hidden absolute z-20">
                <div class="h-full bg-blue-500 w-1/3 animate-pulse-fast transform translate-x-[-100%] transition-transform duration-1000" style="animation: indeterminate 1.5s infinite linear;"></div>
            </div>

            <div class="flex-1 overflow-y-auto p-2 md:p-6 pb-[calc(6rem+env(safe-area-inset-bottom))] md:pb-6 relative" @click.self="closeContextMenu">
                
                <div x-show="isLoading" x-cloak class="space-y-4 w-full h-full p-4 animate-pulse">
                    <div class="h-12 bg-slate-200 dark:bg-slate-800 rounded-xl w-full"></div>
                    <div class="h-16 bg-slate-200 dark:bg-slate-800 rounded-2xl w-full"></div>
                    <div class="h-16 bg-slate-200 dark:bg-slate-800 rounded-2xl w-full"></div>
                </div>

                <div x-show="!isLoading" x-transition.opacity>
                    <div class="mb-4 relative group">
                        <div class="absolute inset-y-0 left-0 flex items-center pl-4 pointer-events-none">
                            <i class="fa-solid fa-magnifying-glass text-slate-400 group-focus-within:text-blue-500 transition-colors"></i>
                        </div>
                        <input type="text" x-model="searchQuery" @input="currentPage = 1" :placeholder="t('search_placeholder')" class="w-full pl-11 pr-10 py-3 rounded-2xl bg-white/60 dark:bg-slate-900/60 border border-slate-200 dark:border-slate-700/50 focus:outline-none focus:ring-2 focus:ring-blue-500/50 focus:bg-white dark:focus:bg-slate-800 text-slate-800 dark:text-slate-200 transition-all shadow-sm backdrop-blur-md">

        </div>
        
        <h3 class="text-xl font-bold text-slate-900 dark:text-white mb-2" x-text="toastModal.type === 'error' ? t('failure') : t('success')"></h3>
        <p class="text-slate-600 dark:text-slate-300 text-sm mb-2" x-text="toastModal.message"></p>
        
        <button @click="toastModal.show = false" class="mt-4 w-full py-3 rounded-xl text-white font-medium shadow-lg transition-transform active:scale-95"
                :class="toastModal.type === 'error' ? 'bg-red-600 hover:bg-red-500 shadow-red-500/25' : 'bg-blue-600 hover:bg-blue-500 shadow-blue-500/25'">
            OK
        </button>
    </div>
</div>

    <div x-show="uploadQueue.length > 0" x-cloak class="fixed bottom-28 md:bottom-6 right-4 md:right-6 w-[calc(100%-2rem)] md:w-80 glass-menu rounded-2xl z-50 overflow-hidden shadow-2xl border border-slate-200 dark:border-slate-700 transition-all" x-transition.slide.right>
        <div class="bg-blue-600 px-4 py-3 text-sm font-semibold text-white flex justify-between items-center shadow-md cursor-pointer" @click="if(!isAllUploadsDone) isQueueMinimized = !isQueueMinimized">
            <span class="flex items-center gap-2">
                <i class="fa-solid" :class="isAllUploadsDone ? 'fa-check-circle text-emerald-300' : 'fa-circle-notch fa-spin'"></i>
                <span x-text="isAllUploadsDone ? t('upload_done') : t('upload_progress')"></span>
            </span>
            <div class="flex items-center gap-3">
                <span class="bg-blue-700 px-2 py-0.5 rounded-md text-xs" x-text="uploadQueue.filter(f => f.progress === 100).length + '/' + uploadQueue.length"></span>
                
                <button x-show="!isAllUploadsDone" @click.stop="isQueueMinimized = !isQueueMinimized" class="hover:text-blue-200 transition-colors w-6 h-6 flex items-center justify-center">
                    <i class="fa-solid" :class="isQueueMinimized ? 'fa-chevron-up' : 'fa-chevron-down'"></i>
                </button>

                <button x-show="isAllUploadsDone" @click.stop="uploadQueue = []; isQueueMinimized = false" class="hover:text-red-200 transition-colors w-6 h-6 flex items-center justify-center text-lg">
                    <i class="fa-solid fa-xmark"></i>
                </button>
            </div>
        </div>

        <div x-show="!isQueueMinimized" x-transition class="max-h-60 overflow-y-auto p-3 space-y-3 bg-white/50 dark:bg-slate-900/50 backdrop-blur-md">
            <template x-for="task in uploadQueue" :key="task.id">
                <div class="p-3 bg-white dark:bg-slate-800 rounded-xl border border-slate-100 dark:border-slate-700 shadow-sm relative group transition-opacity" :class="task.isCancelled ? 'opacity-60' : ''">
                    <div class="flex justify-between items-center text-xs mb-2">
                        <span class="truncate w-[70%] font-medium text-slate-700 dark:text-slate-300" x-text="task.name" :class="task.isCancelled ? 'line-through' : ''"></span> 
                        <span class="font-bold" :class="task.isCancelled ? 'text-red-500' : (task.progress === 100 ? 'text-emerald-500' : 'text-blue-600 dark:text-blue-400')" x-text="task.isCancelled ? 'Đã hủy' : task.progress + '%'"></span>
                    </div>
                    <div class="w-full bg-slate-200 dark:bg-slate-700 rounded-full h-1.5 overflow-hidden">
                        <div class="h-1.5 rounded-full transition-all duration-300 ease-out" 
                             :class="task.isCancelled ? 'bg-red-400' : (task.progress === 100 ? 'bg-emerald-500' : 'bg-gradient-to-r from-blue-500 to-indigo-500')" 
                             :style="`width: ${task.progress}%`"></div>
                    </div>
                    <div class="flex justify-between items-center mt-1.5">
                        <div class="text-[10px] text-slate-400" x-text="task.statusText" :class="task.isCancelled ? 'text-red-400' : ''"></div>
                        
                        <button x-show="task.progress < 100 && !task.isCancelled" 
                                @click="cancelUpload(task.id)" 
                                class="text-slate-400 hover:text-red-500 transition-colors opacity-0 group-hover:opacity-100 focus:opacity-100 p-1 -mr-1 -mb-1">
                            <i class="fa-solid fa-circle-xmark text-sm"></i>
                        </button>
                    </div>
                </div>
            </template>
        </div>
    </div>
    
</body>
</html>
