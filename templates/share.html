<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>{{ .filename }} - TeleCloud</title>
    <link rel="icon" href="/static/favicon.ico" type="image/x-icon">
    <link rel="shortcut icon" href="/static/favicon.ico" type="image/x-icon">
    
    <link rel="stylesheet" href="/static/css/tailwind.css">
    <link rel="stylesheet" href="/static/css/fontawesome.min.css">
    
    <link rel="stylesheet" href="/static/css/style.css">
    <script src="/static/js/common.js"></script>
    
    <script defer src="/static/js/alpine.min.js"></script>
    <link rel="stylesheet" href="/static/css/plyr.css" />
    <script src="/static/js/plyr.polyfilled.js"></script>

    <!-- SEO & Social Meta Tags -->
    <meta name="description" content="Download file {{ .filename }} from TeleCloud OS">
    <meta property="og:title" content="{{ .filename }} - TeleCloud">
    <meta property="og:description" content="Size: {{ .size }} - Created: {{ .created_at }}">
    <meta property="og:type" content="website">
    {{ if .has_thumb }}
    <meta property="og:image" content="/s/{{ .token }}/thumb">
    <meta name="twitter:card" content="summary_large_image">
    {{ else }}
    <meta property="og:image" content="/static/favicon.ico">
    <meta name="twitter:card" content="summary">
    {{ end }}
</head>

<body class="bg-slate-50 dark:bg-slate-950 text-slate-800 dark:text-slate-200 relative overflow-x-hidden transition-colors duration-500" 
      x-data="{ 
        lang: TeleCloud.lang,
        t(key) { return TeleCloud.t(key, {}, this.lang); },
        toggleLang() { TeleCloud.toggleLang(); window.location.reload(); }
      }">
    
    <div class="blob-1"></div>
    <div class="blob-2"></div>

    <div id="download-overlay" class="fixed inset-0 z-[500] hidden flex-col items-center justify-center bg-slate-900/70 backdrop-blur-md transition-opacity duration-300 opacity-0">
        <i class="fa-solid fa-cloud-arrow-down text-6xl text-blue-400 mb-6 animate-bounce"></i>
        <div class="text-white text-2xl font-bold mb-2 text-center px-4" x-text="t('preparing_file')"></div>
        <div class="text-white/70 text-sm mb-6" x-text="t('wait_tg')"></div>
        <div class="w-48 h-1.5 bg-slate-700 rounded-full overflow-hidden shadow-inner">
            <div class="h-full bg-blue-500 w-1/3 transform translate-x-[-100%]" style="animation: indeterminate 1.5s infinite linear;"></div>
        </div>
    </div>

    <div class="min-h-screen w-full flex items-center justify-center py-12 px-4 relative z-10">
        
        <main id="main-card" class="w-full max-w-lg glass-panel rounded-[2.5rem] p-6 sm:p-10 animate-fade-in-up transition-all duration-500">
            
            <div class="flex items-center justify-between mb-8 opacity-80">
                <div class="flex items-center gap-3">
                    <div class="w-10 h-10 bg-gradient-to-br from-blue-500 to-purple-600 rounded-xl flex items-center justify-center shadow-lg shadow-blue-500/30">
                        <i class="fa-solid fa-cloud text-xl text-white"></i>
                    </div>
                    <h1 class="text-xl font-bold tracking-tight text-slate-800 dark:text-white">TeleCloud</h1>
                </div>
                <button @click="toggleLang" class="h-9 px-2.5 flex items-center gap-1.5 text-slate-500 hover:text-blue-500 bg-white/50 dark:bg-slate-800/50 rounded-xl transition-colors shadow-sm" :title="t('lang_' + (lang === 'vi' ? 'en' : 'vi'))">
                    <i class="fa-solid fa-earth-americas text-base"></i>
                    <span class="text-xs font-bold uppercase" x-text="lang"></span>
                </button>
            </div>

            <div id="main-content-grid" class="flex flex-col gap-8 w-full">
                
                <div id="info-section" class="flex flex-col items-center text-center w-full transition-all duration-500">
                    <div id="file-icon-container" class="w-24 h-24 rounded-[2rem] flex items-center justify-center shadow-inner mb-6 transition-all duration-300">
                        <i class="fa-solid fa-file text-5xl"></i>
                    </div>

                    <h2 class="text-2xl sm:text-3xl font-bold text-slate-900 dark:text-white break-all line-clamp-3 mb-2 transition-all duration-300" id="raw-filename">{{ .filename }}</h2>
                    <p id="file-type-name" class="text-sm font-semibold text-blue-600 dark:text-blue-400 mb-6 uppercase tracking-wider transition-all duration-300" x-text="t('loading')"></p>

                    <div class="w-full bg-white/40 dark:bg-slate-900/40 rounded-2xl p-4 border border-slate-200/50 dark:border-slate-700/50 space-y-3 text-sm transition-all duration-300">
                        <div class="flex justify-between items-center">
                            <span class="text-slate-500 dark:text-slate-400" x-text="t('size') + ':'"></span>
                            <span class="font-bold text-slate-800 dark:text-slate-200" id="formatted-size">{{ .size }}</span>
                        </div>
                        <div class="h-px w-full bg-slate-200/50 dark:bg-slate-700/50"></div>
                        <div class="flex justify-between items-center">
                            <span class="text-slate-500 dark:text-slate-400" x-text="t('date') + ':'"></span>
                            <span class="font-bold text-slate-800 dark:text-slate-200" id="formatted-date">{{ .created_at }}</span>
                        </div>
                    </div>
                </div>

                <div class="flex flex-col gap-4 w-full justify-center">
                    
                    <div id="media-preview-container" class="w-full mb-2 hidden flex-col items-center justify-center rounded-[1.5rem] p-1.5 glass-button shadow-sm transition-all">
                    </div>
            
                    <form method="POST" action="/s/{{ .token }}/dl" target="hidden_download_iframe" id="download-form" class="w-full">
                        <button type="submit" class="group relative w-full flex items-center justify-center gap-3 py-4 rounded-2xl bg-blue-600 hover:bg-blue-500 text-white font-bold text-lg shadow-[0_10px_20px_rgba(37,99,235,0.3)] transition-all active:scale-[0.98] overflow-hidden">
                            <div class="absolute inset-0 -translate-x-full bg-gradient-to-r from-transparent via-white/20 to-transparent group-hover:animate-[shimmer_1.5s_infinite]"></div>
                            <i class="fa-solid fa-cloud-arrow-down text-2xl animate-bounce"></i>
                            <span x-text="t('download_now')"></span>
                        </button>
                    </form>

                    <iframe name="hidden_download_iframe" class="hidden"></iframe>
                    
                    <p class="text-center text-xs text-slate-400 dark:text-slate-500 mt-2 flex items-center justify-center gap-1.5">
                        <i class="fa-solid fa-shield-halved text-emerald-500 text-sm"></i>
                        <span x-text="t('safe_msg')"></span>
                    </p>
                </div>

            </div>

            <footer class="mt-10 text-center relative z-10 opacity-60 hover:opacity-100 transition-opacity">
                <div class="flex items-center justify-center gap-4 mb-2">
                    <a href="https://github.com/dabeecao/telecloud-go" target="_blank" class="text-slate-500 hover:text-blue-500 transition-colors">
                        <i class="fa-brands fa-github text-lg"></i>
                    </a>
                </div>
                <p class="text-xs text-slate-500 dark:text-slate-400 font-medium">Powered by <span class="font-bold text-blue-500">TeleCloud OS</span> &copy; 2026 <span class="text-blue-600 dark:text-blue-400">@dabeecao</span></p>
            </footer>
        </main>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const rawFilename = document.getElementById('raw-filename').innerText.trim();
            const rawSize = parseInt(document.getElementById('formatted-size').innerText) || 0;
            const rawDate = document.getElementById('formatted-date').innerText;

            document.getElementById('formatted-size').innerText = TeleCloud.formatBytes(rawSize);
            document.getElementById('formatted-date').innerText = TeleCloud.formatDate(rawDate);

            function applyFileTypeStyling(filename) {
                const container = document.getElementById('file-icon-container');
                const typeNameEl = document.getElementById('file-type-name');
                const result = TeleCloud.getFileTypeData(filename);

                container.className = 'w-24 h-24 rounded-[2rem] flex items-center justify-center shadow-inner mb-6 transition-all duration-300 ' + result.c;
                container.innerHTML = result.i.replace('text-2xl', 'text-5xl');
                typeNameEl.innerText = result.n;
            }

            applyFileTypeStyling(rawFilename);

            const ext = rawFilename.split('.').pop().toLowerCase();
            const previewContainer = document.getElementById('media-preview-container');
            const streamUrl = '/s/{{ .token }}/stream';
            const thumbUrl = '/s/{{ .token }}/thumb'; 
            const hasThumb = '{{ .has_thumb }}' === 'true' || '{{ .has_thumb }}' === '1';

            const imgExts = ['jpg', 'jpeg', 'png', 'gif', 'webp', 'svg', 'bmp'];
            const videoExts = ['mp4', 'webm', 'ogg', 'mov'];
            const audioExts = ['mp3', 'wav', 'ogg', 'm4a', 'flac'];
            const mimeTypes = { 
                'mp4': 'video/mp4', 'webm': 'video/webm', 'ogg': 'video/ogg', 
                'mov': 'video/mp4', 'mp3': 'audio/mpeg', 'wav': 'audio/wav', 
                'flac': 'audio/flac', 'm4a': 'audio/mp4' 
            };

            let isMedia = false;
            let playerTarget = null;

            if (imgExts.includes(ext)) {
                previewContainer.innerHTML = '<img src="' + streamUrl + '" alt="' + rawFilename + '" class="max-h-72 object-contain rounded-[1rem] w-full shadow-lg">';
                isMedia = true;
            } else if (videoExts.includes(ext)) {
                const typeAttr = mimeTypes[ext] || 'video/mp4';
                const posterAttr = hasThumb ? 'data-poster="' + thumbUrl + '"' : '';
                previewContainer.innerHTML = '<div class="w-full relative z-20 rounded-[1rem] bg-black shadow-md"><video id="tele-player" playsinline controls preload="none" ' + posterAttr + '><source src="' + streamUrl + '" type="' + typeAttr + '"></video></div>';
                isMedia = true;
                playerTarget = '#tele-player';
            } else if (audioExts.includes(ext)) {
                const typeAttr = mimeTypes[ext] || 'audio/mpeg';
                const coverHtml = hasThumb ? '<img src="' + thumbUrl + '" class="w-48 h-48 mx-auto rounded-2xl mb-4 object-cover shadow-md">' : '';
                previewContainer.innerHTML = '<div class="w-full relative z-20 rounded-[1rem] p-2 sm:p-4">' + coverHtml + '<audio id="tele-player" controls preload="none"><source src="' + streamUrl + '" type="' + typeAttr + '"></audio></div>';
                isMedia = true;
                playerTarget = '#tele-player';
            }

            if (isMedia) {
                previewContainer.classList.remove('hidden');
                previewContainer.classList.add('flex');
                const mainCard = document.getElementById('main-card');
                const contentGrid = document.getElementById('main-content-grid');
                const iconContainer = document.getElementById('file-icon-container');
                
                iconContainer.classList.remove('w-24', 'h-24', 'mb-6', 'rounded-[2rem]');
                iconContainer.classList.add('w-16', 'h-16', 'mb-4', 'rounded-[1.2rem]');
                
                const icon = iconContainer.querySelector('i');
                if (icon) { 
                    icon.classList.remove('text-5xl'); 
                    icon.classList.add('text-3xl'); 
                }
                
                const filenameEl = document.getElementById('raw-filename');
                filenameEl.classList.remove('text-2xl', 'sm:text-3xl', 'mb-2');
                filenameEl.classList.add('text-xl', 'mb-1');
                
                const typeEl = document.getElementById('file-type-name');
                typeEl.classList.remove('mb-6', 'text-sm');
                typeEl.classList.add('mb-4', 'text-xs');
                
                const detailsBox = document.querySelector('#file-type-name').nextElementSibling;
                if (detailsBox && detailsBox.tagName === 'DIV') { 
                    detailsBox.classList.remove('p-4', 'space-y-3'); 
                    detailsBox.classList.add('p-3', 'space-y-2'); 
                }
                
                if (audioExts.includes(ext)) { 
                    mainCard.classList.remove('max-w-lg'); 
                    mainCard.classList.add('max-w-xl'); 
                    contentGrid.className = "flex flex-col gap-6 w-full"; 
                } else { 
                    mainCard.classList.remove('max-w-lg'); 
                    mainCard.classList.add('max-w-4xl'); 
                    contentGrid.className = "grid grid-cols-1 lg:grid-cols-[1fr_1.5fr] gap-8 w-full items-center"; 
                }

                if (playerTarget) { 
                    setTimeout(() => { 
                        new Plyr(playerTarget, { 
                            ratio: '16:9', 
                            controls: ['play-large', 'play', 'progress', 'current-time', 'duration', 'mute', 'settings', 'pip', 'fullscreen'], 
                            settings: ['speed'], 
                            speed: { selected: 1, options: [0.5, 0.75, 1, 1.25, 1.5, 2] } 
                        }); 
                    }, 50); 
                }
            }
            
            const form = document.getElementById('download-form');
            const overlay = document.getElementById('download-overlay');
            
            form.addEventListener('submit', () => {
                overlay.classList.remove('hidden'); 
                overlay.classList.add('flex');
                setTimeout(() => overlay.classList.remove('opacity-0'), 10);
                
                document.cookie = "dl_started=; expires=Thu, 01 Jan 1970 00:00:00 UTC; path=/;";
                
                let checkCookie = setInterval(() => {
                    if (document.cookie.includes('dl_started=1')) {
                        clearInterval(checkCookie); 
                        overlay.classList.add('opacity-0');
                        setTimeout(() => { 
                            overlay.classList.add('hidden'); 
                            overlay.classList.remove('flex'); 
                        }, 300); 
                        document.cookie = "dl_started=; expires=Thu, 01 Jan 1970 00:00:00 UTC; path=/;";
                    }
                }, 500);
                
                setTimeout(() => { 
                    clearInterval(checkCookie); 
                    overlay.classList.add('opacity-0'); 
                    setTimeout(() => { 
                        overlay.classList.add('hidden'); 
                        overlay.classList.remove('flex'); 
                    }, 300); 
                }, 15000);
            });
        });
    </script>
</body>
</html>
