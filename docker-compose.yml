services:
  telecloud:
    image: ghcr.io/dabeecao/telecloud-go:latest
    build:
      context: .
      dockerfile: Dockerfile
    container_name: telecloud
    restart: unless-stopped
    ports:
      - "${PORT:-8091}:8091"
    env_file:
      - .env
    user: "65532:65532"
    environment:
      # Override paths to point inside /app/data volume
      - DATABASE_PATH=/app/data/database.db
      - THUMBS_DIR=/app/data/thumbs
      - TEMP_DIR=/app/data/temp
      - SESSION_FILE=/app/data/session.json
      # Optional: FFmpeg for thumbnail generation.
      # Install ffmpeg on the host, mount the binary, then set the path:
      #   volumes: - /usr/bin/ffmpeg:/usr/bin/ffmpeg:ro
      #   environment: - FFMPEG_PATH=/usr/bin/ffmpeg
    volumes:
      # Persist database, thumbnails, temp files, and Telegram session
      - ./data:/app/data
    # NOTE: distroless/static image has no shell or wget/curl,
    # so CMD-SHELL healthchecks cannot work inside the container.
    # Use an external monitoring tool or a sidecar container instead.
    # healthcheck:
    #   test: ["CMD-SHELL", "wget -qO- http://localhost:8091/ > /dev/null 2>&1 || exit 1"]
    #   interval: 30s
    #   timeout: 10s
    #   retries: 3
    #   start_period: 15s
